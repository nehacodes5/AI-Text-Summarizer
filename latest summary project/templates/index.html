<!DOCTYPE html>
<html>
<head>
    <title>AI Text Summarizer</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
          <style>
            body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
}

.container {
    width: 70%;
    max-width: 800px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px lightgray;
}

h1 {
    text-align: center;
}

textarea {
    width: 100%;
    height: 250px;
    padding: 15px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid gray;
    resize: vertical;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background-color: green;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background-color: darkgreen;
}

.result {
    margin-top: 25px;
    padding: 20px;
    background-color: #eafbea;
    border-radius: 8px;
}
          </style>
</head>
<body>

    <div class="container">

        <h1>AI Text Summarizer</h1>

        <form method="POST">

            <textarea
                name="text"
                placeholder="Paste your text here..."
                required></textarea>

            <button type="submit">
                Summarize
            </button>

        </form>

        {% if summary %}
        <div class="result">
            <h2>Summary</h2>
            <p>{{ summary }}</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
